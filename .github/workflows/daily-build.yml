name: Daily GeoIP and Geosite Compiler

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 02:00 UTC
  workflow_dispatch: # Manual trigger from UI
  push:
    paths:
      - 'config.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout and clean
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Update local tags
        run: |
          git fetch --tags --force
          git tag -f latest HEAD

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Go install v2fly/geoip tool
        run: go install github.com/v2fly/geoip@latest

      - name: Build custom geoip.dat files
        run: $(go env GOPATH)/bin/geoip -c ./config.json

      - name: Generate sha256 checksums
        run: |
          cd ./output
          sha256sum geoip.dat > geoip.dat.sha256sum

      - name: Generate release and time tag
        id: tag
        run: |
          echo "release_tag=v$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
          echo "time_tag=v$(date +'%M:%H %d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Delete old-latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload and Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Daily automated build"
          body: "Automated daily compilation of GeoIP data. Generated on ${{ steps.tag.outputs.time_tag }}."
          draft: false
          prerelease: false
          make_latest: true
          files: |
            ./output/geoip.dat
            ./output/geoip.dat.sha256sum

      - name: Create historical backup release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Archive Build #${{ github.run_number }}"
          body: "Backup history release."
          draft: false
          prerelease: false
          make_latest: false
          files: |
            ./output/geoip.dat
            ./output/geoip.dat.sha256sum

      - name: Keep 5 releases in history
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
